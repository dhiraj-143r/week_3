<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishFilter</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 300px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      overflow-x: hidden;
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #111111 0%, #0d0d0d 100%);
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #fff;
      box-shadow: 0 2px 8px rgba(99,102,241,0.3);
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-top: 1px;
    }

    .header-version {
      margin-left: auto;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      font-family: monospace;
    }

    /* ── Scan Button ───────────────────────────────────────── */
    .scan-section {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .scan-btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 10px rgba(99,102,241,0.25);
    }

    .scan-btn:hover {
      background: linear-gradient(135deg, #5558e6 0%, #7c4feb 100%);
      box-shadow: 0 4px 15px rgba(99,102,241,0.35);
      transform: translateY(-1px);
    }

    .scan-btn:active {
      transform: translateY(0);
    }

    .scan-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .scan-btn .icon { font-size: 15px; }

    .scan-status {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
    }

    .scan-status.error { color: #ef4444; }
    .scan-status.success { color: #22c55e; }

    /* ── History ────────────────────────────────────────────── */
    .history-section {
      padding: 14px 18px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s ease;
      cursor: default;
    }

    .history-item:hover {
      background: rgba(255,255,255,0.04);
    }

    .history-verdict {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-verdict.high-risk { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.4); }
    .history-verdict.medium-risk { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.4); }
    .history-verdict.safe { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4); }

    .history-info {
      flex: 1;
      min-width: 0;
    }

    .history-subject {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      margin-top: 2px;
    }

    .history-score {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .history-score.high-risk { background: rgba(239,68,68,0.15); color: #f87171; }
    .history-score.medium-risk { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .history-score.safe { background: rgba(34,197,94,0.15); color: #4ade80; }

    .empty-state {
      text-align: center;
      padding: 24px 0;
      color: rgba(255,255,255,0.15);
      font-size: 12px;
    }

    .empty-state .empty-icon {
      font-size: 24px;
      margin-bottom: 8px;
      opacity: 0.3;
    }

    /* ── Settings ───────────────────────────────────────────── */
    .settings-section {
      padding: 14px 18px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .settings-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 0;
      width: 100%;
    }

    .settings-toggle:hover {
      color: rgba(255,255,255,0.5);
    }

    .settings-toggle .arrow {
      transition: transform 0.2s ease;
      font-size: 8px;
    }

    .settings-toggle .arrow.open {
      transform: rotate(90deg);
    }

    .settings-form {
      display: none;
      margin-top: 10px;
      flex-direction: column;
      gap: 8px;
    }

    .settings-form.open {
      display: flex;
    }

    .settings-form label {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 2px;
    }

    .settings-form input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .settings-form input:focus {
      border-color: rgba(99,102,241,0.4);
    }

    .settings-form input::placeholder {
      color: rgba(255,255,255,0.12);
    }

    .save-btn {
      padding: 7px 14px;
      border: none;
      border-radius: 8px;
      background: rgba(99,102,241,0.15);
      color: #818cf8;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .save-btn:hover {
      background: rgba(99,102,241,0.25);
    }

    .save-btn.saved {
      background: rgba(34,197,94,0.15);
      color: #4ade80;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer {
      padding: 12px 18px;
      border-top: 1px solid rgba(255,255,255,0.04);
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #818cf8;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo">🛡️</div>
    <div class="header-text">
      <h1>PhishFilter</h1>
      <p>AI-Powered Phishing Detection</p>
    </div>
    <span class="header-version">v1.0</span>
  </div>

  <!-- Scan Button -->
  <div class="scan-section">
    <button class="scan-btn" id="scanCurrentBtn">
      <span class="icon">🛡️</span>
      Scan Current Email
    </button>
    <div class="scan-status" id="scanStatus"></div>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="section-title">Recent Scans</div>
    <div class="history-list" id="historyList">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        No scans yet — open an email and click scan
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-section">
    <button class="settings-toggle" id="settingsToggle">
      <span class="arrow" id="settingsArrow">▶</span>
      Notification Settings
    </button>
    <div class="settings-form" id="settingsForm">
      <div>
        <label>Email for report delivery</label>
        <input type="email" id="userEmail" placeholder="you@example.com">
      </div>
      <div>
        <label>WhatsApp number</label>
        <input type="tel" id="userPhone" placeholder="+91 98765 43210">
      </div>
      <button class="save-btn" id="saveSettingsBtn">Save Settings</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="http://localhost:3000" target="_blank" rel="noopener noreferrer">
      Open Full Dashboard →
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
